<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Checkout securely – TechStore Electronics">
  <title>Checkout – TechStore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="container d-flex justify-content-between">
    <div class="d-flex align-items-center gap-2">
      <i class="fas fa-lock text-neon"></i>
      <span style="font-weight:600;color:#fff;">Secure Checkout</span>
    </div>
    <a href="cart.html" style="font-size:0.85rem;"><i class="fas fa-arrow-left me-1"></i> Return to Cart</a>
  </div>
</div>

<!-- NAVBAR (Simplified for Checkout) -->
<nav class="main-navbar" style="padding:1rem 0;">
  <div class="container text-center">
    <a href="index.html" class="navbar-brand d-inline-block">
      <div class="brand-logo" style="font-size:1.8rem;"><i class="fas fa-bolt me-1"></i>Tech<span>Store</span></div>
    </a>
  </div>
</nav>

<!-- CHECKOUT PAGE -->
<div class="checkout-page">
  <div class="container" style="max-width:1100px;">
    
    <form id="checkoutForm">
      <div class="row g-4">
        
        <!-- Left Column: Forms -->
        <div class="col-lg-7 col-xl-8">
          
          <!-- Contact Info -->
          <div class="checkout-form-wrap mb-4">
            <div class="checkout-section-title"><div style="width:24px;height:24px;background:var(--primary);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;margin-right:0.5rem;">1</div> Contact Information</div>
            <div class="checkout-body">
              <div class="row g-3">
                <div class="col-12">
                  <label style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.4rem;display:block;">Email Address *</label>
                  <input type="email" class="form-control-custom" placeholder="john@example.com" required>
                </div>
                <div class="col-12">
                  <label class="filter-checkbox" style="margin-top:0.5rem;">
                    <input type="checkbox" checked>
                    Keep me up to date on news and exclusive offers
                  </label>
                </div>
              </div>
            </div>
          </div>
          
          <!-- Shipping Address -->
          <div class="checkout-form-wrap mb-4">
            <div class="checkout-section-title"><div style="width:24px;height:24px;background:var(--primary);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;margin-right:0.5rem;">2</div> Shipping Address</div>
            <div class="checkout-body">
              <div class="row g-3">
                <div class="col-md-6">
                  <label style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.4rem;display:block;">First Name *</label>
                  <input type="text" class="form-control-custom" required>
                </div>
                <div class="col-md-6">
                  <label style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.4rem;display:block;">Last Name *</label>
                  <input type="text" class="form-control-custom" required>
                </div>
                <div class="col-12">
                  <label style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.4rem;display:block;">Company (Optional)</label>
                  <input type="text" class="form-control-custom">
                </div>
                <div class="col-12">
                  <label style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.4rem;display:block;">Address *</label>
                  <input type="text" class="form-control-custom" placeholder="Street address or P.O. Box" required>
                </div>
                <div class="col-12">
                  <input type="text" class="form-control-custom" placeholder="Apartment, suite, unit, building, floor, etc.">
                </div>
                <div class="col-md-5">
                  <label style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.4rem;display:block;">City *</label>
                  <input type="text" class="form-control-custom" required>
                </div>
                <div class="col-md-4">
                  <label style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.4rem;display:block;">State/Province *</label>
                  <select class="form-control-custom" required>
                    <option value="">Select State</option>
                    <option value="CA">California</option>
                    <option value="NY">New York</option>
                    <option value="TX">Texas</option>
                  </select>
                </div>
                <div class="col-md-3">
                  <label style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.4rem;display:block;">ZIP / Postal Code *</label>
                  <input type="text" class="form-control-custom" required>
                </div>
                <div class="col-12">
                  <label style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.4rem;display:block;">Phone Number *</label>
                  <input type="tel" class="form-control-custom" required>
                </div>
              </div>
            </div>
          </div>

          <!-- Payment -->
          <div class="checkout-form-wrap">
            <div class="checkout-section-title"><div style="width:24px;height:24px;background:var(--primary);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;margin-right:0.5rem;">3</div> Payment</div>
            <div class="checkout-body">
              <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1rem;">All transactions are secure and encrypted.</p>
              
              <!-- Payment Method Selector -->
              <div class="payment-method-card selected">
                <div class="d-flex align-items-center gap-3">
                  <input type="radio" name="paymentMethod" checked style="accent-color:var(--primary);">
                  <div class="flex-grow-1" style="font-weight:600;color:#fff;">Credit / Debit Card</div>
                  <div class="d-flex gap-1">
                    <i class="fab fa-cc-visa" style="font-size:1.5rem;color:#1A1F71;"></i>
                    <i class="fab fa-cc-mastercard" style="font-size:1.5rem;color:#EB001B;"></i>
                    <i class="fab fa-cc-amex" style="font-size:1.5rem;color:#2E77BC;"></i>
                  </div>
                </div>
                <div class="mt-3" style="padding-left:1.8rem;">
                  <div class="row g-3">
                    <div class="col-12">
                      <input type="text" class="form-control-custom" placeholder="Card number" required>
                    </div>
                    <div class="col-12">
                      <input type="text" class="form-control-custom" placeholder="Name on card" required>
                    </div>
                    <div class="col-6">
                      <input type="text" class="form-control-custom" placeholder="Expiration (MM/YY)" required>
                    </div>
                    <div class="col-6">
                      <input type="text" class="form-control-custom" placeholder="Security code (CVV)" required>
                    </div>
                  </div>
                </div>
              </div>

              <div class="payment-method-card">
                <div class="d-flex align-items-center gap-3">
                  <input type="radio" name="paymentMethod" style="accent-color:var(--primary);">
                  <div class="flex-grow-1" style="font-weight:600;color:#fff;">PayPal</div>
                  <i class="fab fa-paypal" style="font-size:1.5rem;color:#003087;"></i>
                </div>
              </div>
              
              <div class="payment-method-card">
                <div class="d-flex align-items-center gap-3">
                  <input type="radio" name="paymentMethod" style="accent-color:var(--primary);">
                  <div class="flex-grow-1" style="font-weight:600;color:#fff;">Crypto (Bitcoin, ETH)</div>
                  <i class="fab fa-bitcoin" style="font-size:1.5rem;color:#F7931A;"></i>
                </div>
              </div>

            </div>
          </div>
          
        </div>

        <!-- Right Column: Order Summary -->
        <div class="col-lg-5 col-xl-4">
          <div class="order-review-card sticky-top" style="top:2rem;">
            <div class="checkout-section-title">Order Summary</div>
            
            <!-- Items -->
            <div id="orderItemsReview" style="max-height:300px;overflow-y:auto;">
              <!-- Rendered by JS -->
            </div>
            
            <div style="padding:1.5rem;">
              <div class="coupon-input-group mb-4">
                <input type="text" class="coupon-input" id="checkoutCoupon" placeholder="Discount code">
                <button type="button" class="coupon-btn" onclick="applyCoupon()">Apply</button>
              </div>

              <div class="d-flex justify-content-between mb-2 pb-2 border-bottom" style="border-color:var(--border)!important;">
                <span class="text-muted">Subtotal</span>
                <span id="orderSubtotal" class="text-white fw-bold">...</span>
              </div>
              <div class="d-flex justify-content-between mb-2 pb-2 border-bottom" style="border-color:var(--border)!important;">
                <span class="text-muted">Shipping</span>
                <span class="text-success fw-bold text-uppercase">Free</span>
              </div>
              
              <div class="d-flex justify-content-between align-items-center mt-3 pt-2">
                <span class="text-white" style="font-size:1.1rem;font-weight:700;">Total</span>
                <span id="orderTotal" style="font-size:1.5rem;font-weight:900;color:var(--neon);">...</span>
              </div>
              
              <button type="submit" class="btn-primary-custom w-100 justify-content-center mt-4" style="font-size:1.1rem;letter-spacing:0.5px;padding:1rem;">
                <i class="fas fa-lock"></i> Pay Now
              </button>
            </div>
          </div>
        </div>

      </div>
    </form>
  </div>
</div>

<div class="toast-container-custom" id="toastContainer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
